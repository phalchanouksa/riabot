# Rasa Configuration for RiaBot - Career Counselor Chatbot
# Uses Rasa as dialogue controller + Qwen for natural language generation

recipe: default.v1

language: en

pipeline:
  # Tokenizer - handles English and native Khmer sentence splitting without spaces
- name: khmer_tokenizer.KhmerTokenizer
  intent_tokenization_flag: false
  intent_split_symbol: "_"

  # Featurizers
- name: RegexFeaturizer
- name: LexicalSyntacticFeaturizer
- name: CountVectorsFeaturizer
- name: CountVectorsFeaturizer
  analyzer: char_wb
  min_ngram: 1
  max_ngram: 4

  # Intent classification & entity extraction
- name: DIETClassifier
  epochs: 100
  constrain_similarities: true

  # Entity synonym mapping
- name: EntitySynonymMapper

  # Response selection
- name: ResponseSelector
  epochs: 100
  constrain_similarities: true

  # Fallback classifier for low-confidence intents
- name: FallbackClassifier
  threshold: 0.4
  ambiguity_threshold: 0.1

policies:
  # Memoization for exact story matches
- name: MemoizationPolicy
  max_history: 5

  # Rule-based policy for strict rules
- name: RulePolicy
  core_fallback_threshold: 0.3
  core_fallback_action_name: action_default_fallback
  enable_fallback_prediction: true

  # TED for generalized dialogue
- name: TEDPolicy
  max_history: 10
  epochs: 100
  constrain_similarities: true
assistant_id: 20260221-134822-deterministic-manuscript
