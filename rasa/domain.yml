version: "3.1"

intents:
  - greet
  - goodbye
  - ask_help
  - ask_bot_name
  - ask_major_recommendation
  - start_survey
  - answer_question
  - stop_survey
  - show_results
  - open_faq
  - open_faq_general
  - open_faq_majors
  - open_faq_scholarships
  - open_faq_tuition
  - open_faq_contact
  - nlu_fallback

entities:
  - answer_value

slots:
  survey_active:
    type: bool
    initial_value: false
    influence_conversation: true
    mappings:
      - type: custom

  current_question_idx:
    type: float
    initial_value: 0
    influence_conversation: false
    mappings:
      - type: custom

  questions_queue:
    type: any
    initial_value: []
    influence_conversation: false
    mappings:
      - type: custom

  answers_collected:
    type: any
    initial_value: {}
    influence_conversation: false
    mappings:
      - type: custom

  questions_asked_count:
    type: float
    initial_value: 0
    influence_conversation: true
    mappings:
      - type: custom

  prediction_confidence:
    type: float
    initial_value: 0.0
    influence_conversation: true
    mappings:
      - type: custom

  predicted_major:
    type: text
    initial_value: null
    influence_conversation: false
    mappings:
      - type: custom

  survey_stage:
    type: categorical
    values:
      - profiling
      - narrowing
      - refining
      - complete
    influence_conversation: true
    mappings:
      - type: custom

  should_continue:
    type: bool
    initial_value: true
    influence_conversation: true
    mappings:
      - type: custom

  answer_value:
    type: float
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: answer_value

  last_processed_message_id:
    type: text
    initial_value: null
    influence_conversation: false
    mappings:
      - type: custom

responses:
  utter_greet:
    - text: "សួស្តី! ខ្ញុំជា RiaBot។ ខ្ញុំអាចជួយអ្នកឆ្លើយសំណួរអំពីសាកលវិទ្យាល័យអង្គរ ឬជួយចាប់ផ្តើមតេស្តណែនាំជំនាញសិក្សា។"
      buttons:
        - title: "ចាប់ផ្តើមតេស្ត"
          payload: "/start_survey"
        - title: "ព័ត៌មានសាលា"
          payload: "/open_faq"

  utter_bot_name:
    - text: "ខ្ញុំឈ្មោះ RiaBot។ ខ្ញុំជាជំនួយការសម្រាប់ឆ្លើយសំណួរអំពីសាកលវិទ្យាល័យអង្គរ និងជួយចាប់ផ្តើមតេស្តណែនាំជំនាញសិក្សា។"

  utter_goodbye:
    - text: "អរគុណដែលបានប្រើ RiaBot។ សូមជួបគ្នាម្តងទៀត។"

  utter_help:
    - text: "ខ្ញុំអាចជួយបាន ២ ចម្បង៖ សំណួរអំពីសាកលវិទ្យាល័យអង្គរ និងតេស្តណែនាំជំនាញសិក្សា។"
      buttons:
        - title: "ចាប់ផ្តើមតេស្ត"
          payload: "/start_survey"
        - title: "ព័ត៌មានសាលា"
          payload: "/open_faq"

  utter_major_guidance:
    - text: "ខ្ញុំអាចជួយណែនាំថា អ្នកគួររៀនជំនាញអ្វី តាមរយៈតេស្តណែនាំជំនាញសិក្សា។ សូមចាប់ផ្តើមតេស្ត ដើម្បីឲ្យខ្ញុំវាយតម្លៃចំណាប់អារម្មណ៍ និងជំនាញរបស់អ្នកជាមុនសិន។"
      buttons:
        - title: "ចាប់ផ្តើមតេស្ត"
          payload: "/start_survey"
        - title: "ព័ត៌មានសាលា"
          payload: "/open_faq"

  utter_faq_menu:
    - text: "សូមជ្រើសរើសប្រធានបទដែលអ្នកចង់សួរអំពីសាកលវិទ្យាល័យអង្គរ។"
      buttons:
        - title: "ព័ត៌មានទូទៅ"
          payload: "/open_faq_general"
        - title: "មុខជំនាញ"
          payload: "/open_faq_majors"
        - title: "អាហារូបករណ៍"
          payload: "/open_faq_scholarships"
        - title: "តម្លៃសិក្សា"
          payload: "/open_faq_tuition"
        - title: "ទំនាក់ទំនង"
          payload: "/open_faq_contact"
        - title: "ចាប់ផ្តើមតេស្ត"
          payload: "/start_survey"

  utter_faq_menu_general:
    - text: "សាកលវិទ្យាល័យអង្គរ (Angkor University) គឺជាគ្រឹះស្ថានឧត្តមសិក្សាឯកជនមួយនៅខេត្តសៀមរាប ដែលត្រូវបានបង្កើតឡើងនៅឆ្នាំ ២០០៤ និងទទួលស្គាល់ដោយក្រសួងពាក់ព័ន្ធ។"
      buttons:
        - title: "មុខជំនាញ"
          payload: "/open_faq_majors"
        - title: "ទំនាក់ទំនង"
          payload: "/open_faq_contact"
        - title: "ត្រឡប់ទៅ FAQ"
          payload: "/open_faq"

  utter_faq_menu_scholarships:
    - text: "សាកលវិទ្យាល័យអង្គរផ្តល់អាហារូបករណ៍ពិសេសសម្រាប់និស្សិតថ្មីដែលបានបញ្ចប់មធ្យមសិក្សាទុតិយភូមិ ដើម្បីលើកទឹកចិត្តសិស្សដែលមានលទ្ធផលសិក្សាល្អ។\n\nកម្រិតអាហារូបករណ៍មានដូចជា៖\nនិទ្ទេស A = 100% ពេញកម្មវិធីសិក្សា\nនិទ្ទេស B = 50% ពេញកម្មវិធីសិក្សា\nនិទ្ទេស C = 25% ពេញកម្មវិធីសិក្សា\nនិទ្ទេស D = 15% ពេញកម្មវិធីសិក្សា\nនិទ្ទេស E = 15% ពេញកម្មវិធីសិក្សា\nនិទ្ទេស F = 15% ពេញកម្មវិធីសិក្សា\n\nសម្រាប់ព័ត៌មានបន្ថែម សូមទាក់ទងសាកលវិទ្យាល័យអង្គរដោយផ្ទាល់។"
      buttons:
        - title: "តម្លៃសិក្សា"
          payload: "/open_faq_tuition"
        - title: "ទំនាក់ទំនង"
          payload: "/open_faq_contact"
        - title: "ត្រឡប់ទៅ FAQ"
          payload: "/open_faq"

  utter_faq_menu_tuition:
    - text: "សម្រាប់ព័ត៌មានលម្អិតអំពីតម្លៃសិក្សា សូមទាក់ទងសាកលវិទ្យាល័យអង្គរដោយផ្ទាល់តាមលេខ 017 671 825 / 070 853 537 ឬតាម Facebook Page របស់សាកលវិទ្យាល័យ។"
      buttons:
        - title: "អាហារូបករណ៍"
          payload: "/open_faq_scholarships"
        - title: "ទំនាក់ទំនង"
          payload: "/open_faq_contact"
        - title: "ត្រឡប់ទៅ FAQ"
          payload: "/open_faq"

  utter_faq_menu_contact:
    - text: "ទីតាំង៖ បុរីសៀងណាំ ភូមិខ្នារ សង្កាត់ជ្រាវ ក្រុងសៀមរាប ខេត្តសៀមរាប\nទូរស័ព្ទ៖ 017 671 825 / 070 853 537\nអ៊ីមែល៖ info@angkor.edu.kh"
      buttons:
        - title: "ព័ត៌មានទូទៅ"
          payload: "/open_faq_general"
        - title: "ចាប់ផ្តើមតេស្ត"
          payload: "/start_survey"
        - title: "ត្រឡប់ទៅ FAQ"
          payload: "/open_faq"

  utter_survey_welcome:
    - text: "យើងនឹងចាប់ផ្តើមតេស្តណែនាំជំនាញសិក្សា។ សូមឆ្លើយសំណួរនីមួយៗដោយប្រើលេខតាមជម្រើសដែលបង្ហាញ។"

  utter_ask_question:
    - text: "សំណួរទី {question_num}: {question_text}\n{scale}"

  utter_ask_question_fallback:
    - text: "សំណួរទី {question_num}: សូមជ្រើសចម្លើយរបស់អ្នកសម្រាប់សំណួរ {question_idx}\n{scale}"

  utter_no_answers:
    - text: "មិនទាន់មានចម្លើយសម្រាប់បង្ហាញលទ្ធផលទេ។ សូមវាយ 'ចាប់ផ្តើម' ដើម្បីធ្វើតេស្ត។"

  utter_survey_results:
    - text: "លទ្ធផលណែនាំជំនាញសិក្សារបស់អ្នកបានរួចរាល់។\n\n{results_summary}\n\nមូលហេតុសង្ខេប៖\n{explanation}"

  utter_survey_results_partial:
    - text: "នេះជាលទ្ធផលបណ្តោះអាសន្នរបស់អ្នក៖ **{major}**\n\n{results_summary}\n\nមូលហេតុសង្ខេប៖\n{explanation}"

  utter_survey_results_exploratory:
    - text: "ទិសដៅមុខជំនាញដែលអ្នកអាចសាកស្វែងយល់បន្ថែម៖\n\n{results_summary}\n\nមូលហេតុសង្ខេប៖\n{explanation}"

  utter_ml_error:
    - text: "សូមអភ័យទោស។ ប្រព័ន្ធមិនអាចបង្ហាញលទ្ធផលបាននៅពេលនេះទេ។ សូមសាកល្បងម្តងទៀតបន្តិចក្រោយ។"

  utter_no_survey_active:
    - text: "បច្ចុប្បន្នមិនមានតេស្តកំពុងដំណើរការទេ។ សូមវាយ 'ចាប់ផ្តើម' ដើម្បីចាប់ផ្តើមតេស្ត។"

  utter_invalid_answer_number:
    - text: "សូមឆ្លើយជាលេខតែប៉ុណ្ណោះ។"

  utter_invalid_answer_interest:
    - text: "សម្រាប់សំណួរចំណាប់អារម្មណ៍ សូមឆ្លើយជាលេខ 1 ដល់ 4។"

  utter_invalid_answer_skill:
    - text: "សម្រាប់សំណួរជំនាញ សូមឆ្លើយជាលេខ 0 ដល់ 3។"

  utter_survey_paused:
    - text: "តេស្តត្រូវបានផ្អាកសិន។ លទ្ធផលបណ្តោះអាសន្នរបស់អ្នកគឺ **{major}**។ វាយ 'ចាប់ផ្តើម' ដើម្បីបន្ត។"

  utter_survey_paused_no_pred:
    - text: "តេស្តត្រូវបានផ្អាកសិន។ វាយ 'ចាប់ផ្តើម' ដើម្បីបន្ត។"

  utter_survey_stopped_new:
    - text: "បានបញ្ឈប់តេស្ត។ វាយ 'ចាប់ផ្តើម' ដើម្បីចាប់ផ្តើមឡើងវិញ។"

  utter_fallback_rephrase:
    - text: "ខ្ញុំអាចជួយបានតែព័ត៌មានអំពីសាកលវិទ្យាល័យអង្គរ ឬការចាប់ផ្តើមតេស្តណែនាំជំនាញសិក្សាប៉ុណ្ណោះ។"
      buttons:
        - title: "ព័ត៌មានសាលា"
          payload: "/open_faq"
        - title: "ចាប់ផ្តើមតេស្ត"
          payload: "/start_survey"

actions:
  - action_start_survey
  - action_ask_next_question
  - action_process_answer
  - action_show_results
  - action_show_available_majors
  - action_stop_survey
  - action_default_fallback

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: false
